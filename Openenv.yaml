name: agriculture-irrigation
version: 0.1.0
description: Agricultural Irrigation Optimization Environment

environment:
  python: "3.10"
  dependencies:
    - pip
    - pip:
      - -r requirements.txt

entrypoints:
  server:
    command: uvicorn app:app --host 0.0.0.0 --port 7860
    type: service
    port: 7860